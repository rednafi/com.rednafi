name: Deploy agent-ready edge worker

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/deploy-agent-ready.yml
      - package.json
      - package-lock.json
      - workers/agent-ready/**
      - wrangler.agent-ready.toml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run agent-ready unit tests
        run: npm run test:agent-ready

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: f2c208344e8adb0cf3ea1e48dccf7218
          command: deploy --config wrangler.agent-ready.toml
