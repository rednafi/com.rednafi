name: Cut over agent-ready edge

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cutover:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - name: Enable proxy and verify the public site
        shell: bash
        run: |
          set -euo pipefail

          api() {
            local method="$1"
            local url="$2"
            local data="${3:-}"
            if [ -n "$data" ]; then
              curl -fsS -X "$method" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                "$url" \
                --data "$data"
              return
            fi

            curl -fsS -X "$method" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "$url"
          }

          ZONE_ID="$(api GET "https://api.cloudflare.com/client/v4/zones?name=rednafi.com" | jq -r '.result[0].id')"
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "Could not resolve Cloudflare zone ID" >&2
            exit 1
          fi

          RECORDS="$(api GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?per_page=1000" \
            | jq -c '.result[] | select((.name == "rednafi.com" and .type == "A") or (.name == "www.rednafi.com" and .type == "CNAME"))')"
          if [ -z "$RECORDS" ]; then
            echo "Could not find apex A records or the www CNAME" >&2
            exit 1
          fi

          rollback() {
            echo "Verification failed; reverting proxied flags"
            while IFS= read -r record; do
              [ -n "$record" ] || continue
              record_id="$(jq -r '.id' <<<"$record")"
              proxied="$(jq -c '.proxied' <<<"$record")"
              api PATCH "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$record_id" "{\"proxied\":$proxied}" >/dev/null
            done <<<"$RECORDS"
          }
          trap rollback ERR

          api PATCH "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/ssl" '{"value":"full"}' >/dev/null
          api PATCH "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/always_use_https" '{"value":"on"}' >/dev/null

          while IFS= read -r record; do
            [ -n "$record" ] || continue
            record_id="$(jq -r '.id' <<<"$record")"
            api PATCH "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$record_id" '{"proxied":true}' >/dev/null
          done <<<"$RECORDS"

          api GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/ssl" | jq -e '.result.value == "full"' >/dev/null
          api GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/always_use_https" | jq -e '.result.value == "on"' >/dev/null
          api GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?per_page=1000" \
            | jq -e 'all(.result[] | select((.name == "rednafi.com" and .type == "A") or (.name == "www.rednafi.com" and .type == "CNAME")); .proxied == true)' >/dev/null

          for attempt in $(seq 1 24); do
            headers="$(curl -fsSI https://rednafi.com/ || true)"
            status="$(printf '%s\n' "$headers" | awk 'NR == 1 { print $2 }')"

            if printf '%s\n' "$headers" | grep -qi '^server: cloudflare' && { [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; }; then
              printf '%s\n' "$headers"
              trap - ERR
              exit 0
            fi

            sleep 5
          done

          echo "Timed out waiting for Cloudflare edge to serve https://rednafi.com/" >&2
          exit 1
