name: Bootstrap Standard.site publication

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Create publication and update config
        env:
          ATP_IDENTIFIER: ${{ secrets.ATP_IDENTIFIER }}
          ATP_APP_PASSWORD: ${{ secrets.ATP_APP_PASSWORD }}
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          cd "$workdir"
          npm init -y >/dev/null
          npm install @atproto/api@0.18.17 mime-types@2.1.35 >/dev/null

          cat > bootstrap.mjs <<'EOF'
          import { AtpAgent } from "@atproto/api";
          import fs from "node:fs/promises";
          import path from "node:path";
          import { lookup } from "mime-types";

          const workspace = process.env.GITHUB_WORKSPACE;
          const agent = new AtpAgent({ service: process.env.PDS_URL || "https://bsky.social" });

          await agent.login({
            identifier: process.env.ATP_IDENTIFIER,
            password: process.env.ATP_APP_PASSWORD,
          });

          const record = {
            $type: "site.standard.publication",
            url: "https://rednafi.com",
            name: "Redowan's Reflections",
            description:
              "Redowan Delowar writes about software engineering, platform work, distributed systems, resilience, and building reliable products.",
            createdAt: new Date().toISOString(),
            preferences: {
              showInDiscover: true,
            },
          };

          const iconPath = path.join(workspace, "static", "favicon.png");
          const icon = await fs.readFile(iconPath);
          const uploaded = await agent.com.atproto.repo.uploadBlob(new Uint8Array(icon), {
            encoding: lookup(iconPath) || "image/png",
          });
          record.icon = uploaded.data.blob;

          const created = await agent.com.atproto.repo.createRecord({
            repo: agent.did,
            collection: "site.standard.publication",
            record,
          });

          const publicationUri = created.data.uri;
          const oldUri =
            "at://did:plc:fgtm2c26vfcj74rfmeggbyqj/site.standard.publication/self";

          const sequoiaPath = path.join(workspace, "sequoia.json");
          const sequoia = JSON.parse(await fs.readFile(sequoiaPath, "utf8"));
          sequoia.publicationUri = publicationUri;
          await fs.writeFile(sequoiaPath, `${JSON.stringify(sequoia, null, 2)}\n`);

          const configPath = path.join(workspace, "config.yml");
          const config = await fs.readFile(configPath, "utf8");
          await fs.writeFile(configPath, config.replace(oldUri, publicationUri));

          await fs.writeFile(
            path.join(workspace, "static", ".well-known", "site.standard.publication"),
            publicationUri,
          );

          const testPath = path.join(workspace, "tests", "standard_site_test.go");
          const test = await fs.readFile(testPath, "utf8");
          await fs.writeFile(testPath, test.replace(oldUri, publicationUri));

          await fs.writeFile(path.join(workspace, ".standard-site-publication-uri"), `${publicationUri}\n`);
          EOF

          node bootstrap.mjs

      - name: Verify updated config
        run: |
          set -euo pipefail
          go run ./scripts/standardsitesync --check
          test "$(cat static/.well-known/site.standard.publication)" = "$(jq -r .publicationUri sequoia.json)"
          grep -F "$(cat static/.well-known/site.standard.publication)" config.yml tests/standard_site_test.go

      - name: Commit publication URI
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add sequoia.json config.yml static/.well-known/site.standard.publication tests/standard_site_test.go
          git commit -m "Bootstrap Standard.site publication [skip ci]"
          git push
