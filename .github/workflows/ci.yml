name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.154.2
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache Hugo
        uses: actions/cache@v5
        id: cache-hugo
        with:
          path: ~/hugo.deb
          key: hugo-${{ env.HUGO_VERSION }}

      - name: Download Hugo
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: wget -q -O ~/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb

      - name: Install Hugo
        run: sudo dpkg -i ~/hugo.deb

      - name: Check Prettier formatting
        run: npx -y prettier --check 'content/**/*.md'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Hugo
        run: hugo --gc --minify

      - name: Build Pagefind search index
        run: npx -y pagefind

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: cache-playwright
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/ms-playwright-go
          key: playwright-v2-${{ hashFiles('tests/go.sum') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: tests
        run: go run github.com/playwright-community/playwright-go/cmd/playwright install --with-deps chromium

      - name: Install Playwright deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx -y playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: tests
        run: go test -v -count=1 ./...

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
