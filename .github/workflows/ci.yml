name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.164.0
  NODE_VERSION: 26
  PAGEFIND_VERSION: 1.5.2
  PRETTIER_VERSION: 3.9.5
  SEQUOIA_CLI_VERSION: 0.5.7
  SITE_COVER_PATH: .cache/site-cover/cover-39e2ac8de020.png
  SITE_COVER_URL: https://blob.rednafi.com/home/cover-39e2ac8de020.png?ci-seed-39e2ac8de020
  SITE_COVER_SHA256: 39e2ac8de020f10e7fb985ea235536530a4d5ac3c6fe87c3b14f277a7369843d
  PAGES_SIZE_BUDGET_BYTES: 900000000

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # full history: enableGitInfo derives lastmod from git
          fetch-depth: 0

      - name: Cache Hugo
        uses: actions/cache@v6
        id: cache-hugo
        with:
          path: ~/hugo.deb
          key: hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}

      - name: Download Hugo
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: curl -fsSL --retry 3 --retry-delay 2 -o ~/hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"

      - name: Install Hugo
        run: sudo dpkg -i ~/hugo.deb

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-pagefind-${{ env.PAGEFIND_VERSION }}-prettier-${{ env.PRETTIER_VERSION }}-sequoia-${{ env.SEQUOIA_CLI_VERSION }}

      - name: Cache Hugo remote resources
        uses: actions/cache@v6
        with:
          path: ~/.cache/hugo_cache
          # remote image dims fetched at build; content-hashed URLs never go stale
          key: hugo-cache-${{ runner.os }}-${{ hashFiles('content/**/*.md') }}
          restore-keys: hugo-cache-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: cache-playwright
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/ms-playwright-go
          # go.sum pins playwright-go, which pins the browser build
          key: playwright-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: go run github.com/mxschmitt/playwright-go/cmd/playwright install --with-deps chromium

      - name: Install Playwright deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: go run github.com/mxschmitt/playwright-go/cmd/playwright install-deps chromium

      - name: Normalize post frontmatter
        run: go run ./scripts/frontmatter

      - name: Cache Standard.site cover
        uses: actions/cache@v6
        with:
          path: ${{ env.SITE_COVER_PATH }}
          key: standard-site-cover-39e2ac8de020

      - name: Download Standard.site cover
        run: |
          mkdir -p "$(dirname "${SITE_COVER_PATH}")"
          if [ ! -f "${SITE_COVER_PATH}" ]; then
            curl -fsSL --retry 3 --retry-delay 2 -o "${SITE_COVER_PATH}" "${SITE_COVER_URL}"
          fi
          echo "${SITE_COVER_SHA256}  ${SITE_COVER_PATH}" | sha256sum -c -

      - name: Publish Standard.site records
        env:
          ATP_IDENTIFIER: ${{ secrets.ATP_IDENTIFIER }}
          ATP_APP_PASSWORD: ${{ secrets.ATP_APP_PASSWORD }}
          SEQUOIA_CMD: npx -y sequoia-cli@${{ env.SEQUOIA_CLI_VERSION }} publish
          SEQUOIA_SITE_COVER_SOURCE: ${{ env.SITE_COVER_PATH }}
        run: go run ./scripts/sequoia

      - name: Normalize published post frontmatter
        run: go run ./scripts/frontmatter

      - name: Format generated Markdown metadata
        run: npx -y prettier@${PRETTIER_VERSION} --write "content/**/*.md"

      - name: Check Markdown tabs
        run: go run ./scripts/lintcodeblocks --check

      - name: Check post frontmatter
        run: go run ./scripts/frontmatter --check

      - name: Check media URLs
        run: go run ./scripts/media --check

      - name: Run go fix
        run: go fix ./...

      - name: Commit generated changes
        run: |
          if [ -n "$(git status --porcelain -- content .sequoia-state.json scripts tests)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add content .sequoia-state.json scripts tests
            git commit -m "chore: sync generated changes [skip ci]"
            git push
          else
            echo "Generated files are already up to date."
          fi

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Hugo
        run: hugo --environment production --minify --gc --cleanDestinationDir

      - name: Build Pagefind search index
        run: npx -y pagefind@${PAGEFIND_VERSION}

      - name: Prune unused Pagefind assets
        run: |
          rm -f \
            public/pagefind/pagefind-component-ui.css \
            public/pagefind/pagefind-component-ui.js \
            public/pagefind/pagefind-highlight.js \
            public/pagefind/pagefind-modular-ui.css \
            public/pagefind/pagefind-modular-ui.js \
            public/pagefind/wasm.unknown.pagefind

      - name: Check GitHub Pages artifact size
        run: |
          bytes=$(du -sk public | awk '{print $1 * 1024}')
          echo "public/ is ${bytes} bytes; budget is ${PAGES_SIZE_BUDGET_BYTES} bytes"
          if [ "${bytes}" -gt "${PAGES_SIZE_BUDGET_BYTES}" ]; then
            echo "public/ exceeds the GitHub Pages artifact budget"
            exit 1
          fi

      - name: Run Go tests
        run: go test -v -count=1 ./...

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
