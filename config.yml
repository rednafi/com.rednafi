  cover:
    image: "https://blob.rednafi.com/static/images/home/cover.png"

menu:
  main:
    - identifier: search
      name: search
      url: /search/
      weight: 1
    - identifier: tags
      name: tags
      url: /tags/
      weight: 2
    - identifier: about
      name: about
      url: /about/
      weight: 3

  hamburger:
    - identifier: talks
      name: talks
      url: /talks/
      weight: 0
    - identifier: maxims
      name: maxims
      url: /maxims/
      weight: 1

markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    style: syntax-highlight
    tabWidth: 4

  goldmark:
    extensions:
      definitionList: true
      footnote: true
      typographer: true
    parser:
      attribute:
        block: true
        title: true
    renderer:
      unsafe: true

outputs:
  home: ["HTML", "RSS"]
  page: ["HTML"]
  section: ["HTML", "RSS"]
  taxonomy: ["HTML"]
  term: ["HTML", "RSS"]

services:
  rss:
    limit: 10

security:
  funcs:
    getenv:
      - "^HUGO_"
