baseURL: "https://rednafi.com"
locale: en
title: Redowan's Reflections
pluralizelisttitles: false

enableRobotsTXT: true
googleAnalytics: G-11NK905JK8
enableGitInfo: true

frontmatter:
  lastmod:
    - lastmod
    - :git
    - date

taxonomies:
  tag: tags

related:
  includeNewer: true
  threshold: 20
  toLower: true
  indices:
    - name: tags
      weight: 100
      type: basic
    - name: date
      weight: 10
      pattern: "2006"

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 15

params:
  env: production
  author: "Redowan Delowar"

  social:
    twitter: rednafi

  standardSite:
    publicationUri: "at://did:plc:fgtm2c26vfcj74rfmeggbyqj/site.standard.publication/3mnl6f7ob462z"

  schema:
    jobTitle: Software Engineer
    alternateName: rednafi
    wikidataId: Q139619919
    knowsAbout:
      - "Go"
      - "Python"
      - "Distributed Systems"
      - "Platform Engineering"
      - "Software Design"
    sameAs:
      - "https://github.com/rednafi"
      - "https://www.linkedin.com/in/rednafi/"
      - "https://bsky.app/profile/rednafi.com"
      - "https://x.com/rednafi"
      - "https://www.wikidata.org/wiki/Q139619919"
    websiteAlternateName:
      - "Redowan Delowar's Blog"
      - "rednafi"
  description: >-
    Redowan Delowar writes about software engineering, platform work, distributed
    systems, resilience, and building reliable products.

  DateFormat: "January 2, 2006"

  mainSections:
    - javascript
    - misc
    - zephyr
    - python
    - typescript
    - go
    - system

  notesSection: "shards"

  images: ["https://blob.rednafi.com/static/images/home/cover.png"]

  assets:
    favicon_svg: "/favicon.svg"
    favicon_png: "/favicon.png"

  analytics:
    google:
      SiteVerificationTag: "google-site-verification=GoibEK52o5Z7xpKQ7ppTd8bA_s1wQp5hcG7aIWPJJfk"
    yandex:
      SiteVerificationTag: "cb037a09f985e313"
    naver:
      SiteVerificationTag: "097e5d3cd7b9e1ee3ad0addb5aaeea1b1a50be20"

markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: false
    tabWidth: 4

  goldmark:
    extensions:
      definitionList: true
      footnote: true
      typographer: true
    parser:
      attribute:
        block: true
        title: true
    renderer:
      unsafe: true

outputs:
  home: ["HTML", "RSS"]
  page: ["HTML"]
  section: ["HTML", "RSS"]
  taxonomy: ["HTML"]
  term: ["HTML", "RSS"]

services:
  rss:
    limit: 15

security:
  funcs:
    getenv:
      - "^HUGO_"
