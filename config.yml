baseURL: "https://rednafi.com"
languageCode: en
title: Redowan's Reflections
theme: PaperMod
pluralizelisttitles: false

enableRobotsTXT: true
googleAnalytics: G-11NK905JK8
enableGitInfo: true

frontmatter:
  lastmod:
    - lastmod
    - :git
    - date

taxonomies:
  tag: tags

related:
  includeNewer: true
  threshold: 20
  toLower: true
  indices:
    - name: tags
      weight: 100
      type: basic
    - name: date
      weight: 10
      pattern: "2006"

permalinks:
  posts: "/:section/:slug/"

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 20

params:
  env: production

  schema:
    publisherType: Person
    jobTitle: Software Engineer
    profileImage: "https://blob.rednafi.com/static/images/home/cover.png"
    sameAs:
      - "https://github.com/rednafi"
      - "https://www.linkedin.com/in/rednafi/"
      - "https://bsky.app/profile/rednafi.com"
      - "https://fosstodon.org/@rednafi"

  description: >-
    Personal site of Redowan Delowar - a roving amateur fumbling through software, systems,
    and sundry.

  keywords:
    - software engineering
    - Go programming
    - Python development
    - distributed systems
    - system design
    - testing strategies
    - backend development
    - web development
    - technical writing
    - software architecture

  taxonomyDescriptions:
    api: "Web APIs."
    async: "Asynchronous programming."
    aws: "[Amazon Web Services](https://aws.amazon.com/)."
    cli: "Command-line tools."
    concurrency: "Concurrent and parallel programming."
    "data structures": "Data structures and collections."
    database: "Databases and persistence."
    "design patterns": "Software design patterns."
    devops: "Deployment and infrastructure."
    "distributed systems": "Distributed systems."
    django: "The [Django](https://www.djangoproject.com/) web framework."
    docker: "[Docker](https://www.docker.com/) containers."
    "error handling": "Error handling."
    essay: "Long-form essays."
    git: "[Git](https://git-scm.com/) version control."
    github: "[GitHub](https://github.com/)."
    go: "The [Go](https://go.dev/) programming language."
    hugo: "The [Hugo](https://gohugo.io/) static site generator."
    "incident post-mortem": "Incident post-mortems."
    javascript: "The [JavaScript](https://developer.mozilla.org/en-US/docs/Web/JavaScript) programming language."
    networking: "Networking and protocols."
    performance: "Performance optimization."
    postgresql: "The [PostgreSQL](https://www.postgresql.org/) database."
    pytest: "The [pytest](https://docs.pytest.org/) testing framework."
    python: "The [Python](https://www.python.org/) programming language."
    redis: "The [Redis](https://redis.io/) data store."
    security: "Security."
    shell: "Shell scripting."
    sql: "SQL and relational databases."
    system: "Systems programming."
    testing: "Testing."
    til: "Things I learned."
    typescript: "The [TypeScript](https://www.typescriptlang.org/) programming language."
    typing: "Type systems and static analysis."
    web: "Web development, HTTP, and server-side concerns."
  author: "Redowan Delowar"
  images: ["https://blob.rednafi.com/static/images/home/cover.png"]

  DateFormat: "January 2, 2006"
  defaultTheme: light
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  showtoc: true
  ShowAllPagesInArchive: true
  ShowFullTextinRSS: true

  mainSections:
    - javascript
    - misc
    - zephyr
    - python
    - typescript
    - go
    - system

  assets:
    favicon: "https://blob.rednafi.com/static/images/home/favicon.svg"
    favicon16x16: "https://blob.rednafi.com/static/images/home/favicon.svg"
    favicon32x32: "https://blob.rednafi.com/static/images/home/favicon.svg"
    apple_touch_icon: "https://blob.rednafi.com/static/images/home/favicon.svg"
    safari_pinned_tab: "https://blob.rednafi.com/static/images/home/favicon.svg"
    disableHLJS: true

  homeInfoParams:
