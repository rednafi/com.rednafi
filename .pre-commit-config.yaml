fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/adamchainz/blacken-docs
    rev: "1.20.0"
    hooks:
      - id: blacken-docs
        additional_dependencies:
          - black
        args:
          - -l 79
        verbose: true
        entry: bash -c 'blacken-docs "$@" || true' --

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  # pre-commit.ci can't autofix direct pushes to main, so it fails whenever a
  # hook would modify a file. Skip every hook on CI; local `make format` still
  # runs them all.
  skip: [check-yaml, end-of-file-fixer, trailing-whitespace, black, blacken-docs]
  submodules: false
