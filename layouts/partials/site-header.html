<header class="site-header">
  <a href="/" class="site-title">{{ site.Title }}</a>
  <nav class="site-nav" aria-label="Primary">
    <a href="/archive/"{{ if eq .RelPermalink "/archive/" }} aria-current="page"{{ end }}>Archive</a>
    <a href="/search/"{{ if eq .RelPermalink "/search/" }} aria-current="page"{{ end }}>Search</a>
  </nav>
  <div class="theme-switcher" role="radiogroup" aria-label="Theme">
    <button class="theme-toggle" type="button" role="radio" data-theme-set="light" aria-label="Use light theme" aria-checked="false" tabindex="-1" title="Light">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    </button>
    <button class="theme-toggle" type="button" role="radio" data-theme-set="system" aria-label="Use system theme" aria-checked="true" tabindex="0" title="System">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8"/><path d="M12 16v4"/></svg>
    </button>
    <button class="theme-toggle" type="button" role="radio" data-theme-set="dark" aria-label="Use dark theme" aria-checked="false" tabindex="-1" title="Dark">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.985 12.486A9 9 0 1 1 11.514 3.015a7 7 0 0 0 9.471 9.471Z"/></svg>
    </button>
  </div>
</header>
