{{- with .Params.discussions }}
<nav class="discussion-links" aria-label="Discussions" data-pagefind-ignore>
  <h2>Discussion</h2>
  <p>This post is being discussed at the places below. Feel free to jump in.</p>
  <ul>
    {{- range . }}
    <li><a href="{{ .url }}" target="_blank" rel="noopener noreferrer" aria-label="{{ .label }} (opens in new tab)">{{ .label }}</a></li>
    {{- end }}
  </ul>
</nav>
{{- end }}
