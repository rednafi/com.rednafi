{{- $notes := site.Params.notesSection }}
<div class="post-list">
  {{- range . }}
  <div class="post">
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    <span class="date"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format site.Params.DateFormat }}</time> · {{ if .Params.type_label }}<span class="type-label">{{ .Params.type_label }}</span>{{ else if eq .Section $notes }}<a href="/{{ $notes }}/" class="type-label">shard</a>{{ else }}<a href="/articles/" class="type-label">article</a>{{ end }}</span>
  </div>
  {{- end }}
</div>
