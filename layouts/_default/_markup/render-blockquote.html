{{- if eq .Type "alert" -}}
{{- $alertType := .AlertType -}}
{{- if eq $alertType "gist" -}}
  {{- $alertType = "note" -}}
{{- end -}}
<div class="alert alert-{{ $alertType }}">
  <p class="alert-title">{{ title $alertType }}</p>
  {{ .Text }}
</div>
{{- else -}}
<blockquote>
  {{ .Text }}
</blockquote>
{{- end -}}
