{{- /* Wrap fenced code in a frame. Highlighting still goes through Hugo's Chroma. */ -}}
{{- $lang := .Type -}}
{{- if eq $lang "mermaid" -}}
<div class="mermaid">{{ .Inner }}</div>
{{- else -}}
<div class="codeblock{{ with $lang }} has-lang{{ end }}">
  {{- with $lang }}<span class="codeblock-lang" aria-hidden="true">{{ . }}</span>{{ end }}
  {{ highlight (trim .Inner "\n") $lang .Options }}
</div>
{{- end -}}
