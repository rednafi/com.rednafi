{{- define "head-extra" }}
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
{{- end }}

{{- define "main" }}
<div class="content-column">

<h1>{{ .Title }}</h1>

<noscript>
  <p class="empty-state">Search needs JavaScript. Browse the <a href="/archive/">archive</a> or the <a href="/tags/">tags</a> instead.</p>
</noscript>
<script src="/pagefind/pagefind-ui.js" defer></script>
<div id="search" aria-label="Search posts"></div>
<script>
  window.addEventListener('DOMContentLoaded', function() {
    var search = document.getElementById("search");
    var baseTitle = document.title;
    var initialQuery = new URLSearchParams(window.location.search).get("q") || "";
    var placeholder = {{ .Params.placeholder | default "Search posts" }};
    new PagefindUI({
      element: "#search",
      showSubResults: true,
      showImages: false,
      excerptLength: 15,
      translations: {
        placeholder: placeholder,
        clear_search: "Clear",
        searching: "Searching for [SEARCH_TERM]…"
      },
      ranking: {
        termFrequency: 0.0,
        pageLength: 0.75,
        termSaturation: 1.2,
        termSimilarity: 1.0
      }
    });
    function setHasQuery(value){
      if(search) search.classList.toggle("has-query", !!value);
    }
    function writeSearchURL(value){
      var url = new URL(window.location.href);
      if(value){
        url.searchParams.set("q", value);
      } else {
        url.searchParams.delete("q");
      }
      window.history.replaceState(null, "", url.pathname + url.search + url.hash);
      // reflect the query in the tab/history title
      document.title = value ? value + " · " + baseTitle : baseTitle;
      setHasQuery(value);
    }
    function bindSearchInput(input){
      if(!input || input.dataset.urlStateBound) return;
      input.dataset.urlStateBound = "true";
      // Pagefind ships a bare text input — add search-appropriate hints.
      input.setAttribute("type", "search");
      input.setAttribute("name", "q");
      input.setAttribute("autocomplete", "off");
      input.setAttribute("autocapitalize", "none");
      input.setAttribute("autocorrect", "off");
      input.setAttribute("enterkeyhint", "search");
      input.setAttribute("aria-label", "Search posts");
      input.spellcheck = false;
      function syncURL(){
        writeSearchURL(input.value.trim());
      }
      input.addEventListener("input", syncURL);
      input.addEventListener("change", syncURL);
      input.addEventListener("keyup", function(e){
        if(e.key === "Escape") window.setTimeout(syncURL, 0);
      });
      if(initialQuery){
        input.value = initialQuery;
        input.dispatchEvent(new Event("input", { bubbles: true }));
      } else {
        setHasQuery(input.value.trim());
        // Autofocus on desktop only (fine pointer) — avoid popping the
        // keyboard on touch devices. Search is this page's sole purpose.
        if(window.matchMedia("(hover: hover) and (pointer: fine)").matches){
          input.focus();
        }
      }
    }
    function bindClearButton(button){
      if(!button || button.dataset.urlStateBound) return;
      button.dataset.urlStateBound = "true";
      button.addEventListener("click", function(){
        window.setTimeout(function(){
          var input = search && search.querySelector(".pagefind-ui__search-input");
          writeSearchURL(input ? input.value.trim() : "");
        }, 0);
      });
    }
    function syncFromEvent(e){
      if(e.target && e.target.matches(".pagefind-ui__search-input")){
        writeSearchURL(e.target.value.trim());
      }
    }
    document.addEventListener("input", syncFromEvent, true);
    document.addEventListener("change", syncFromEvent, true);
    function syncSearchStatus(){
      var msg = search && search.querySelector(".pagefind-ui__message");
      if(msg){
        msg.setAttribute("role", "status");
        msg.setAttribute("aria-live", "polite");
        msg.setAttribute("aria-atomic", "true");
      }
      var input = search && search.querySelector(".pagefind-ui__search-input");
      bindSearchInput(input);
      if(input) setHasQuery(input.value.trim());
      bindClearButton(search && search.querySelector(".pagefind-ui__search-clear"));
    }
    syncSearchStatus();
    if(search && "MutationObserver" in window){
      new MutationObserver(syncSearchStatus).observe(search, { childList: true, subtree: true });
    }
  });
</script>

</div>
{{- end }}
