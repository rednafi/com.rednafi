{{- define "main" }}
<div class="content-column">

<h1>{{ .Title }}</h1>

{{- $pages := partial "section-pages.html" . }}

{{- range $pages.GroupByPublishDate "2006" }}
{{- if ne .Key "0001" }}
<div class="archive-year">
  <h2 id="{{ .Key }}">
    <a href="#{{ .Key }}">{{ .Key }}</a>
    <sup>&nbsp;{{ len .Pages }}</sup>
  </h2>
  {{ partial "post-list.html" (dict "pages" .Pages.ByDate.Reverse) }}
</div>
{{- end }}
{{- end }}

</div>
{{- end }}
