{{ $id := printf "carousel-%d" .Ordinal }}
<div class="carousel-wrap" id="{{ $id }}">
  <div class="img-carousel{{ with .Get "class" }} {{ . }}{{ end }}">
    {{ .Inner }}
  </div>
  <button class="carousel-btn carousel-prev" aria-label="Previous">&lsaquo;</button>
  <button class="carousel-btn carousel-next" aria-label="Next">&rsaquo;</button>
</div>
<script>
(function() {
  var wrap = document.getElementById('{{ $id }}');
  var c = wrap.querySelector('.img-carousel');
  var prev = wrap.querySelector('.carousel-prev');
  var next = wrap.querySelector('.carousel-next');
  var fig = c.querySelector('figure');
  if (!fig) return;
  function step() { return fig.offsetWidth + 12; }
  prev.addEventListener('click', function() { c.scrollBy({ left: -step(), behavior: 'smooth' }); });
  next.addEventListener('click', function() { c.scrollBy({ left: step(), behavior: 'smooth' }); });
  function updateBtns() {
    prev.classList.toggle('hidden', c.scrollLeft < 10);
    next.classList.toggle('hidden', c.scrollLeft + c.clientWidth >= c.scrollWidth - 10);
  }
  c.addEventListener('scroll', updateBtns, { passive: true });
  updateBtns();
})();
</script>
